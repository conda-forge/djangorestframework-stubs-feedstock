schema_version: 1

context:
  name: djangorestframework-stubs
  version: "3.17.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 74c0307cad304c03c15aee5955ec2fdeab0ac854b5bea569dc124892792e2b96

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build >=0.11.0,<0.12.0
  run:
    - python >=${{ python_min }}
    - django-stubs >=6.0.4
    - typing_extensions >=4.0
    - types-pyyaml

tests:
  - python:
      imports:
        - mypy_drf_plugin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: PEP-484 stubs for django-rest-framework
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/typeddjango/djangorestframework-stubs

extra:
  recipe-maintainers:
    - thewchan
